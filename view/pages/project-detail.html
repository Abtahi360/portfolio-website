<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Detail — Abtahi Islam</title>
  <link rel="icon" type="image/png" href="../../favicon.png">
  <link rel="stylesheet" href="../css/design.css">
  <link rel="stylesheet" href="../css/contact-upgrade.css">
  <link rel="stylesheet" href="../css/featured-projects.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    (function () {
      const theme = localStorage.getItem("theme") || "light";
      if (theme === "dark") document.documentElement.setAttribute("data-theme", "dark");
    })();
  </script>
  <!-- Data models -->
  <script src="../../model/featured-projects-data.js"></script>
</head>

<body>

  <!-- ── TOP NAV BAR ────────────────────────────────────────── -->
  <header class="nav-shell">
    <div class="nav">
      <div class="nav-left">
        <a href="../../index.html" class="nav-brand" aria-label="Home">
          <img src="../Images/logo.png" alt="Portfolio logo" class="nav-logo-img">
        </a>
      </div>
      <nav class="nav-links" aria-label="Primary navigation">
        <a class="nav-link" href="../../index.html#home">Home</a>
        <a class="nav-link" href="../../index.html#featured-projects">Featured</a>
        <a class="nav-link" href="../../index.html#projects">Projects</a>
        <a class="nav-link" href="../../index.html#contact">Contact</a>
      </nav>
      <div class="nav-cta">
        <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">
          <span class="theme-icon-light">☀️</span>
          <span class="theme-icon-dark">🌙</span>
        </button>
      </div>
    </div>
  </header>

  <!-- ── MAIN ───────────────────────────────────────────────── -->
  <div id="pd-root">

    <!-- Back button -->
    <div class="pd-back-bar">
      <a href="../../index.html#featured-projects" class="pd-back-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        Back to projects
      </a>
    </div>

    <!-- Hero -->
    <div class="pd-hero" id="pd-hero">
      <!-- Populated by JS -->
    </div>

    <!-- Body content -->
    <div class="pd-body" id="pd-body">
      <!-- Populated by JS -->
    </div>

  </div>

  <!-- Lightbox -->
  <div class="pd-lightbox" id="pd-lightbox">
    <button class="pd-lightbox-close" id="pd-lightbox-close">✕</button>
    <img id="pd-lightbox-img" src="" alt="Screenshot">
  </div>

  <!-- ── SCROLL TO TOP ─────────────────────────────────────── -->
  <button id="scroll-to-top" class="scroll-to-top" aria-label="Scroll to top">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
  </button>

  <script>
    /* ── THEME TOGGLE ──────────────────────────────────────── */
    document.getElementById("theme-toggle").addEventListener("click", () => {
      const isDark = document.documentElement.getAttribute("data-theme") === "dark";
      const next   = isDark ? "light" : "dark";
      document.documentElement.setAttribute("data-theme", next);
      localStorage.setItem("theme", next);
    });

    /* ── SCROLL TO TOP ─────────────────────────────────────── */
    const scrollBtn = document.getElementById("scroll-to-top");
    window.addEventListener("scroll", () => {
      if (scrollBtn) scrollBtn.classList.toggle("visible", window.pageYOffset > 300);
    });
    if (scrollBtn) scrollBtn.addEventListener("click", () => window.scrollTo({ top: 0, behavior: "smooth" }));

    /* ── LOAD PROJECT FROM URL PARAM ───────────────────────── */
    function getProjectId() {
      const params = new URLSearchParams(window.location.search);
      return params.get("id") || "";
    }

    function buildTechStack(stack) {
      if (!stack || !Object.keys(stack).length) return "";
      const categories = Object.entries(stack).map(([cat, items]) => {
        const pills = items.map(i => `<span class="pd-tech-pill">${i}</span>`).join("");
        return `<div class="pd-tech-category">
          <div class="pd-tech-category-name">${cat}</div>
          <div class="pd-tech-pills">${pills}</div>
        </div>`;
      }).join("");
      return `<div class="pd-card">
        <h2 class="pd-card-title">Tech Stack</h2>
        <div class="pd-tech-grid">${categories}</div>
      </div>`;
    }

    function buildFeatures(features) {
      if (!features || !features.length) return "";
      const items = features.map(f =>
        `<li><span class="pd-feature-check">✓</span>${f}</li>`
      ).join("");
      return `<div class="pd-card">
        <h2 class="pd-card-title">Key Features</h2>
        <ul class="pd-features-list">${items}</ul>
      </div>`;
    }

    function buildScreenshots(shots) {
      if (!shots || !shots.length) return "";
      const items = shots.map(src =>
        `<div class="pd-screenshot-wrap" data-src="${src}">
           <img src="${src}" alt="Screenshot" loading="lazy">
         </div>`
      ).join("");
      return `<div class="pd-card">
        <h2 class="pd-card-title">Screenshots</h2>
        <div class="pd-screenshots">${items}</div>
      </div>`;
    }

    function buildVideo(youtubeId) {
      if (!youtubeId || youtubeId === "YOUR_YOUTUBE_VIDEO_ID") {
        return `<div class="pd-video-section">
          <div class="pd-section-label">Project Demo</div>
          <div class="pd-video-wrap">
            <div class="pd-video-placeholder">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.5"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></svg>
              <span>Video demo coming soon</span>
            </div>
          </div>
        </div>`;
      }
      return `<div class="pd-video-section">
        <div class="pd-section-label">Project Demo</div>
        <div class="pd-video-wrap">
          <iframe
            src="https://www.youtube.com/embed/${youtubeId}?rel=0&modestbranding=1&autoplay=0"
            title="Project demo video"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            allowfullscreen>
          </iframe>
        </div>
      </div>`;
    }

    function renderProject(proj) {
      document.title = `${proj.title} — Abtahi Islam`;

      /* Hero */
      const tagsHtml = (proj.tags || []).map(t => `<span class="pd-tag">${t}</span>`).join("");
      const heroEl   = document.getElementById("pd-hero");
      if (heroEl) {
        heroEl.innerHTML = `
          <div class="pd-hero-kicker">★ Featured Project · ${proj.year || ""}</div>
          <h1 class="pd-hero-title">${proj.title}</h1>
          <p class="pd-hero-tagline">${proj.tagline || ""}</p>
          <div class="pd-hero-meta">
            ${tagsHtml}
            <span class="pd-status-chip">✓ ${proj.status || "Completed"}</span>
          </div>
          <div class="pd-hero-actions">
            ${proj.repoUrl
              ? `<a href="${proj.repoUrl}" class="pd-action-btn pd-action-primary" target="_blank" rel="noopener">
                   <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>
                   View on GitHub
                 </a>`
              : ""}
            ${proj.liveUrl
              ? `<a href="${proj.liveUrl}" class="pd-action-btn pd-action-ghost" target="_blank" rel="noopener">
                   <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                   Live Demo
                 </a>`
              : ""}
          </div>`;
      }

      /* Body */
      const bodyEl = document.getElementById("pd-body");
      if (bodyEl) {
        bodyEl.innerHTML = [
          /* YouTube embed — plays inline on same page */
          buildVideo(proj.youtubeId),

          /* Overview */
          proj.solution ? `<div class="pd-card">
            <h2 class="pd-card-title">Overview</h2>
            <p>${proj.solution}</p>
            ${proj.impact ? `<p style="margin-top:12px;">${proj.impact}</p>` : ""}
          </div>` : "",

          /* Features */
          buildFeatures(proj.features),

          /* Tech Stack */
          buildTechStack(proj.techStack),

          /* Screenshots */
          buildScreenshots(proj.screenshots)
        ].join("");

        /* Lightbox for screenshots */
        document.querySelectorAll(".pd-screenshot-wrap").forEach(wrap => {
          wrap.addEventListener("click", () => {
            const lb  = document.getElementById("pd-lightbox");
            const img = document.getElementById("pd-lightbox-img");
            if (lb && img) {
              img.src = wrap.dataset.src;
              lb.classList.add("open");
            }
          });
        });
      }
    }

    function init() {
      const id   = getProjectId();
      const proj = (typeof featuredProjects !== "undefined")
        ? featuredProjects.find(p => p.id === id)
        : null;

      if (!proj) {
        const hero = document.getElementById("pd-hero");
        if (hero) hero.innerHTML = `
          <h1 class="pd-hero-title">Project not found</h1>
          <p class="pd-hero-tagline">The project you're looking for doesn't exist yet.</p>
          <a href="../../index.html#featured-projects" class="pd-action-btn pd-action-primary" style="margin-top:12px;">
            ← Back to portfolio
          </a>`;
        return;
      }
      renderProject(proj);
    }

    /* Lightbox close */
    document.getElementById("pd-lightbox-close").addEventListener("click", () => {
      document.getElementById("pd-lightbox").classList.remove("open");
    });
    document.getElementById("pd-lightbox").addEventListener("click", e => {
      if (e.target === e.currentTarget) e.currentTarget.classList.remove("open");
    });
    document.addEventListener("keydown", e => {
      if (e.key === "Escape") document.getElementById("pd-lightbox").classList.remove("open");
    });

    init();
  </script>
</body>
</html>
