<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Details - Abtahi Islam</title>
  <link rel="icon" type="image/png" href="../../favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/design.css">
  <link rel="stylesheet" href="../css/project-detail.css">
  <script>
    (function () {
      var stored = localStorage.getItem("portfolio-theme");
      var theme = stored === "dark" ? "dark" : "light";
      document.documentElement.setAttribute("data-theme", theme);
    })();
  </script>
</head>
<body>
<div class="detail-page">

  <nav class="detail-nav">
    <div class="detail-nav-inner">
      <a href="../../index.html" aria-label="Back to portfolio">
        <img src="../../view/assets/Images/logo.png" alt="Abtahi Islam logo" class="detail-nav-logo">
      </a>
      <button class="detail-theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">
        <span id="theme-icon">🌙</span>
      </button>
    </div>
  </nav>

  <div class="detail-wrap">

    <div class="detail-back-bar">
      <a href="../../index.html#projects" class="detail-back-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
        Back to Projects
      </a>
    </div>

    <div id="detail-hero" class="detail-hero">
      <div style="display:flex;align-items:center;gap:10px;margin-top:48px;color:var(--color-muted);">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          style="animation:spin 1s linear infinite"><path d="M21 12a9 9 0 11-6.219-8.56"/></svg>
        Loading…
      </div>
    </div>

    <div id="detail-video-section" class="detail-video-section" hidden>
      <div class="detail-video-label">Project Walkthrough</div>
      <h2 class="detail-video-heading">Watch the Demo</h2>
      <div class="detail-video-wrapper" id="detail-video-wrapper"></div>
    </div>

    <div class="detail-content" id="detail-content" hidden>
      <div class="detail-main" id="detail-main"></div>
      <div class="detail-sidebar" id="detail-sidebar"></div>
    </div>

    <div class="detail-footer-bar">
      <span class="detail-footer-text">Abtahi Islam · Portfolio</span>
      <a href="../../index.html" class="detail-back-btn">← Return to portfolio</a>
    </div>

  </div>
</div>

<div class="detail-lightbox" id="detail-lightbox" role="dialog" aria-modal="true">
  <button class="detail-lightbox-close" id="lightbox-close" aria-label="Close">×</button>
  <img id="lightbox-img" src="" alt="">
</div>

<style>
@keyframes spin { to { transform: rotate(360deg); } }
</style>

<script>
/*
 * ★ HOW DATA IS LOADED — NO EXTERNAL SCRIPT DEPENDENCY
 *
 * Primary path  → sessionStorage  (set by controller/real-world-projects.js before navigation)
 * Fallback path → window.realWorldProjects (if the model script happened to load)
 *
 * This means the page works on Netlify, Vercel, VS Code Live Server, GitHub Pages
 * regardless of how the server resolves script paths.
 */
(function () {
  "use strict";

  /* ── Theme ─────────────────────────────────────────── */
  var html      = document.documentElement;
  var toggleBtn = document.getElementById("theme-toggle");
  var themeIcon = document.getElementById("theme-icon");

  function applyTheme(t) {
    html.setAttribute("data-theme", t);
    localStorage.setItem("portfolio-theme", t);
    themeIcon.textContent = t === "dark" ? "☀️" : "🌙";
  }

  themeIcon.textContent = html.getAttribute("data-theme") === "dark" ? "☀️" : "🌙";
  toggleBtn.addEventListener("click", function () {
    applyTheme(html.getAttribute("data-theme") === "dark" ? "light" : "dark");
  });

  /* ── Helpers ───────────────────────────────────────── */
  function esc(s) {
    return String(s || "")
      .replace(/&/g, "&amp;").replace(/</g, "&lt;")
      .replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
  }

  function qp(name) {
    return new URLSearchParams(window.location.search).get(name);
  }

  /* ── Load project data ─────────────────────────────── */
  var projectId = qp("id");
  var project   = null;

  // 1) Primary: sessionStorage (set by controller before navigation)
  try {
    var cached = sessionStorage.getItem("rw_projects_cache");
    if (cached) {
      var list = JSON.parse(cached);
      for (var i = 0; i < list.length; i++) {
        if (list[i].id === projectId) { project = list[i]; break; }
      }
    }
  } catch (e) { /* sessionStorage unavailable */ }

  // 2) Fallback: globally loaded model script
  if (!project && typeof realWorldProjects !== "undefined") {
    for (var j = 0; j < realWorldProjects.length; j++) {
      if (realWorldProjects[j].id === projectId) { project = realWorldProjects[j]; break; }
    }
  }

  /* ── Not found ─────────────────────────────────────── */
  if (!project) {
    document.getElementById("detail-hero").innerHTML =
      '<div style="padding:80px 0;text-align:center;">' +
      '<div style="font-size:3rem;margin-bottom:20px;">🔍</div>' +
      '<h2 style="font-size:1.6rem;font-weight:800;margin:0 0 10px;color:var(--color-primary);">Project not found</h2>' +
      '<p style="color:var(--color-muted);margin:0 0 24px;">No project with id <strong>' + esc(projectId) + '</strong> was found.</p>' +
      '<a href="../../index.html#projects" class="detail-btn detail-btn-primary">← Back to Projects</a>' +
      "</div>";
    return;
  }

  document.title = esc(project.title) + " — Abtahi Islam";

  /* ── Hero ──────────────────────────────────────────── */
  var tagsHtml = (project.tags || []).map(function (t) {
    return '<span class="detail-tag">' + esc(t) + "</span>";
  }).join("");

  var actionsHtml = "";
  if (project.repoUrl)
    actionsHtml +=
      '<a class="detail-btn detail-btn-ghost" href="' + esc(project.repoUrl) + '" target="_blank" rel="noopener">' +
      '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>' +
      " Source Code</a>";
  if (project.liveUrl)
    actionsHtml +=
      '<a class="detail-btn detail-btn-primary" href="' + esc(project.liveUrl) + '" target="_blank" rel="noopener">' +
      '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>' +
      " View Live Demo</a>";

  var statsHtml = "";
  if (project.stats && project.stats.length) {
    statsHtml =
      '<div class="detail-stats-row">' +
      project.stats.map(function (s) {
        return (
          '<div class="detail-stat-item"><div class="detail-stat-value">' +
          esc(s.value) + '</div><div class="detail-stat-label">' + esc(s.label) + "</div></div>"
        );
      }).join("") + "</div>";
  }

  document.getElementById("detail-hero").innerHTML =
    '<div class="detail-hero-kicker">Real-World Solutions</div>' +
    '<h1 class="detail-hero-title">' + esc(project.title) + "</h1>" +
    (project.subtitle ? '<p class="detail-hero-subtitle">' + esc(project.subtitle) + "</p>" : "") +
    statsHtml +
    '<div class="detail-tags">' + tagsHtml + "</div>" +
    '<div class="detail-hero-actions">' + actionsHtml + "</div>";

  // Cover image — path is relative to site root, prepend ../../ to reach root from /view/pages/
  if (project.coverImage) {
    var coverDiv = document.createElement("div");
    coverDiv.className = "detail-cover";
    coverDiv.innerHTML =
      '<img src="../../' + esc(project.coverImage) + '" alt="' + esc(project.title) + ' screenshot">';
    document.getElementById("detail-hero").after(coverDiv);
  }

  /* ── Video ─────────────────────────────────────────── */
  document.getElementById("detail-video-section").hidden = false;
  var videoWrapper = document.getElementById("detail-video-wrapper");
  if (project.youtubeVideoId) {
    videoWrapper.innerHTML =
      '<iframe src="https://www.youtube.com/embed/' + esc(project.youtubeVideoId) +
      '?rel=0&modestbranding=1" title="' + esc(project.title) +
      ' demo" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>';
  } else {
    videoWrapper.innerHTML =
      '<div class="detail-video-placeholder">' +
      '<div class="detail-video-placeholder-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg></div>' +
      "<span>Demo video coming soon</span></div>";
  }

  /* ── Sections ───────────────────────────────────────── */
  var mainEl   = document.getElementById("detail-main");
  var sections = project.sections || [];
  if (!sections.length && project.overview) {
    sections = [{ number: "01", title: "Overview", body: project.overview, highlights: project.highlights }];
  }

  sections.forEach(function (sec, idx) {
    var div = document.createElement("div");
    div.className = "detail-numbered-section";

    /* Highlights */
    var hlHtml = "";
    if (sec.highlights && sec.highlights.length) {
      hlHtml =
        '<ul class="detail-highlights">' +
        sec.highlights.map(function (h) { return "<li>" + esc(h) + "</li>"; }).join("") +
        "</ul>";
    }

    /* Table */
    var tableHtml = "";
    if (sec.table && sec.table.headers && sec.table.rows) {
      var t = sec.table;
      var lastColIdx = t.headers.length - 1;

      var theadCells = t.headers.map(function (h) {
        return "<th>" + esc(h) + "</th>";
      }).join("");

      var tbodyRows = t.rows.map(function (row) {
        var cells = row.map(function (cell, ci) {
          /* Last column gets the accent metric pill */
          var inner = ci === lastColIdx
            ? '<span class="detail-table-metric">' + esc(cell) + "</span>"
            : esc(cell);
          return "<td>" + inner + "</td>";
        }).join("");
        return "<tr>" + cells + "</tr>";
      }).join("");

      tableHtml =
        '<div class="detail-table-wrap">' +
        '<table class="detail-table">' +
        "<thead><tr>" + theadCells + "</tr></thead>" +
        "<tbody>" + tbodyRows + "</tbody>" +
        "</table></div>";
    }

    div.innerHTML =
      '<div class="detail-section-number">' + esc(sec.number || "0" + (idx + 1)) + ". " + esc(sec.title) + "</div>" +
      '<h2 class="detail-section-heading">' + esc(sec.heading || sec.title) + "</h2>" +
      '<div class="detail-section-body"><p>' + esc(sec.body || "") + "</p></div>" +
      hlHtml +
      tableHtml;

    mainEl.appendChild(div);
  });

  /* Gallery */
  if (project.gallery && project.gallery.length) {
    var galSection = document.createElement("div");
    galSection.className = "detail-numbered-section";
    galSection.innerHTML =
      '<div class="detail-section-number">Screenshots</div>' +
      '<h2 class="detail-section-heading">Gallery</h2>' +
      '<div class="detail-gallery" id="detail-gallery"></div>';
    mainEl.appendChild(galSection);

    project.gallery.forEach(function (src) {
      var item = document.createElement("div");
      item.className = "detail-gallery-item";
      var img = document.createElement("img");
      img.src = "../../" + src;
      img.alt = project.title + " screenshot";
      img.loading = "lazy";
      item.appendChild(img);
      item.addEventListener("click", function () { openLightbox("../../" + src); });
      document.getElementById("detail-gallery").appendChild(item);
    });
  }

  /* ── Sidebar ───────────────────────────────────────── */
  var sidebarEl = document.getElementById("detail-sidebar");

  if (project.techStack && project.techStack.length) {
    var techCard = document.createElement("div");
    techCard.className = "detail-sidebar-card";
    techCard.innerHTML =
      '<div class="detail-sidebar-card-title">// Technologies</div>' +
      project.techStack.map(function (group) {
        return (
          '<div class="detail-tech-group">' +
          '<div class="detail-tech-group-label">' + esc(group.category) + "</div>" +
          '<div class="detail-tech-chips">' +
          group.items.map(function (i) { return '<span class="detail-tech-chip">' + esc(i) + "</span>"; }).join("") +
          "</div></div>"
        );
      }).join("");
    sidebarEl.appendChild(techCard);
  }

  var linksHtml = "";
  if (project.repoUrl)
    linksHtml +=
      '<a href="' + esc(project.repoUrl) + '" target="_blank" rel="noopener" class="detail-btn detail-btn-ghost" style="justify-content:flex-start;">' +
      '<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>' +
      " GitHub Repo</a>";
  if (project.liveUrl)
    linksHtml +=
      '<a href="' + esc(project.liveUrl) + '" target="_blank" rel="noopener" class="detail-btn detail-btn-primary" style="justify-content:flex-start;">' +
      '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>' +
      " Live Demo</a>";

  if (linksHtml) {
    var linksCard = document.createElement("div");
    linksCard.className = "detail-sidebar-card";
    linksCard.innerHTML = '<div class="detail-sidebar-card-title">→ Links</div><div>' + linksHtml + "</div>";
    sidebarEl.appendChild(linksCard);
  }

  document.getElementById("detail-content").hidden = false;

  /* ── Lightbox ──────────────────────────────────────── */
  var lb    = document.getElementById("detail-lightbox");
  var lbImg = document.getElementById("lightbox-img");
  function openLightbox(src) {
    lbImg.src = src;
    lb.classList.add("open");
    document.body.style.overflow = "hidden";
  }
  function closeLightbox() {
    lb.classList.remove("open");
    document.body.style.overflow = "";
    lbImg.src = "";
  }
  document.getElementById("lightbox-close").addEventListener("click", closeLightbox);
  lb.addEventListener("click", function (e) { if (e.target === lb) closeLightbox(); });
  document.addEventListener("keydown", function (e) { if (e.key === "Escape") closeLightbox(); });

})();
</script>
</body>
</html>
