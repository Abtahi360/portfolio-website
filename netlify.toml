# ================================================================
#  netlify.toml — Portfolio Website
# ================================================================

[build]
  publish = "."
  command = ""

# ── CACHE HEADERS ─────────────────────────────────────────────
[[headers]]
  for = "/view/assets/Images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/view/assets/documents/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/view/css/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/controller/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/model/*.js"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# ── SECURITY HEADERS ──────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection       = "1; mode=block"
    Referrer-Policy        = "strict-origin-when-cross-origin"

# ── 404 fallback (for SPA routing) ────────────────────────────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 404
